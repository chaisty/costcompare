name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web (typecheck + lint + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Vitest
        working-directory: web
        run: npm test

  edge-functions:
    name: edge functions (deno test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno typecheck
        run: deno check supabase/functions/submit/index.ts

      - name: Deno tests
        run: deno test --allow-env --allow-net supabase/functions/submit/

  db:
    name: db (pgTAP via supabase CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Run pgTAP suite
        run: supabase test db

      - name: Stop Supabase
        if: always()
        run: supabase stop
